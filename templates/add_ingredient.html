{% extends "base.html" %}
{% block title %}Add Ingredient{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card" style="width:480px;">
        <h2>Add an Ingredient</h2>
        <p class="subtitle">Share an ingredient from your country</p>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="/ingredients/add/">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="e.g. Saffron" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="6" placeholder="Origin, flavor, common uses..." required></textarea>
            </div>
            <button type="submit" class="form-submit">Publish Ingredient</button>
        </form>
        <p class="form-footer"><a href="/entry/">&larr; Back to dashboard</a></p>
    </div>
</div>
{% endblock %}
