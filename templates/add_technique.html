{% extends "base.html" %}
{% block title %}Add Technique{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card" style="width:480px;">
        <h2>Add a Technique</h2>
        <p class="subtitle">Share a technique from your country</p>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="/techniques/add/">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="e.g. Sous Vide" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="6" placeholder="Describe the technique, when to use it, and tips..." required></textarea>
            </div>
            <div class="form-group">
                <label>Cultural Significance</label>
                <textarea name="cultural_significance" rows="4" placeholder="Origin, traditions, cultural role of this technique..." required></textarea>
            </div>
            <div class="form-group">
                <label>Necessary Tools <span style="font-weight:400;color:#888;">(optional)</span></label>
                <textarea name="necessary_tools" rows="3" placeholder="e.g. immersion circulator, vacuum sealer, heavy cast-iron pan..."></textarea>
            </div>
            <button type="submit" class="form-submit">Publish Technique</button>
        </form>
        <p class="form-footer"><a href="/entry/">&larr; Back to dashboard</a></p>
    </div>
</div>
{% endblock %}
