{# Reusable advanced search CSS + open/close behavior. Include once per page. #}
<style>
.adv-search {
    background:#fff; border:1px solid #e5e5e5; border-radius:8px;
    margin-bottom:24px; box-shadow:0 1px 4px rgba(0,0,0,.04); overflow:hidden;
}
.adv-search-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; cursor:pointer; user-select:none; background:#fafafa;
    border-bottom:1px solid transparent; transition:border-color .15s;
}
.adv-search.open .adv-search-head { border-bottom-color:#e5e5e5; }
.adv-search-head h3 {
    font-size:.82rem; font-weight:700; text-transform:uppercase;
    letter-spacing:1.5px; color:#1a1a1a; display:flex; align-items:center; gap:10px;
}
.adv-search-head .count { font-size:.72rem; color:#c0392b; font-weight:700; }
.adv-search-head .chev { font-size:.85rem; color:#888; transition:transform .15s; }
.adv-search.open .adv-search-head .chev { transform:rotate(180deg); }
.adv-search-body { display:none; padding:18px 20px; }
.adv-search.open .adv-search-body { display:block; }
.adv-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:14px; margin-bottom:14px;
}
.adv-grid label {
    display:block; font-size:.74rem; font-weight:700; margin-bottom:5px;
    color:#555; text-transform:uppercase; letter-spacing:.7px;
}
.adv-grid input, .adv-grid select {
    width:100%; padding:9px 12px; font-size:.88rem; border:1.5px solid #ddd;
    border-radius:6px; outline:none; font-family:inherit; background:#fafafa;
    transition:border-color .15s;
}
.adv-grid input:focus, .adv-grid select:focus { border-color:#c0392b; background:#fff; }
.adv-range { display:flex; gap:6px; }
.adv-range input { flex:1; }
.adv-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.adv-actions button {
    padding:10px 22px; background:#c0392b; color:#fff; border:none;
    border-radius:6px; font-size:.85rem; font-weight:700; cursor:pointer;
    letter-spacing:.5px; transition:background .2s;
}
.adv-actions button:hover { background:#a93226; }
.adv-actions a.adv-clear {
    padding:10px 18px; background:#fff; color:#555; border:1.5px solid #ccc;
    border-radius:6px; font-size:.85rem; font-weight:700; transition:background .2s;
}
.adv-actions a.adv-clear:hover { background:#f5f5f5; }
.adv-actions .adv-status { font-size:.82rem; color:#888; margin-left:auto; }
</style>
<script>
function toggleAdvSearch(el) { el.parentElement.classList.toggle('open'); }
</script>
